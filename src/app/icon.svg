    <path d="M16.4 17.8C16 14.7 18.5 12 21.6 12h6.2v40.5H19c-2.4 0-4.4-1.7-4.8-4.1L11.6 24c-.3-2.1 1.1-4 3.2-4.3l1.6-.2v-1.7Z" fill="url(#gold)" transform="rotate(-7 20 32)" />
