<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="CVCraft">
  <defs>
    <linearGradient id="bg" x1="10" y1="8" x2="54" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7EFE0" />
      <stop offset="0.55" stop-color="#C7A064" />
      <stop offset="1" stop-color="#7A5A2C" />
    </linearGradient>
    <linearGradient id="paper" x1="20" y1="10" x2="44" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" />
      <stop offset="1" stop-color="#EFE7DA" />
    </linearGradient>
    <linearGradient id="gold" x1="14" y1="12" x2="45" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D5B173" />
      <stop offset="1" stop-color="#A37A3C" />
    </linearGradient>
    <filter id="shadow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#2B2A28" flood-opacity="0.28" />
    </filter>
    <filter id="softShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#2B2A28" flood-opacity="0.18" />
    </filter>
    <style>
      @media (prefers-reduced-motion: no-preference) {
        .stack {
          animation: float 3.8s ease-in-out infinite;
          transform-origin: 32px 32px;
        }
        .glint {
          animation: glint 2.6s ease-in-out infinite;
          transform-origin: 46px 17px;
        }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0) rotate(-4deg); }
        50% { transform: translateY(-2px) rotate(-1deg); }
      }
      @keyframes glint {
        0%, 100% { opacity: .42; transform: scale(.88); }
        45% { opacity: 1; transform: scale(1.08); }
      }
    </style>
  </defs>

  <rect width="64" height="64" rx="18" fill="url(#bg)" />
