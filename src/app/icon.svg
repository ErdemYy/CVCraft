    <rect x="29" y="29" width="14" height="2.1" rx="1.05" fill="#B08D57" transform="rotate(-7 36 30.05)" />
    <rect x="28.5" y="34" width="12" height="1.8" rx=".9" fill="#8C8378" transform="rotate(-7 34.5 34.9)" />
    <rect x="28" y="39" width="15" height="1.8" rx=".9" fill="#8C8378" transform="rotate(-7 35.5 39.9)" />
    <rect x="18.8" y="19" width="7.7" height="7.2" rx="1.4" fill="#FFF8EA" transform="rotate(-7 22.65 22.6)" />
